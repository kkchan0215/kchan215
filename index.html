<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 뽑기판 🎁</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

body{
    margin:0;
    font-family:'Jua',sans-serif;
    background:#fff5e6;
    text-align:center;
}

h1{
    margin:20px;
}

#board{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(45px,1fr));
    gap:6px;
    padding:15px;
}

.ticket{
    background:white;
    border:2px dashed #ff9acb;
    border-radius:10px;
    aspect-ratio:1;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-size:18px;
    transition:.2s;
}

.ticket:hover{
    transform:scale(1.1);
}

.used{
    opacity:.3;
    pointer-events:none;
}

#result{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    font-size:50px;
}

.drum{
    animation:shake .08s infinite;
}

@keyframes shake{
    0%{transform:translateX(-4px);}
    50%{transform:translateX(4px);}
    100%{transform:translateX(-4px);}
}
</style>
</head>
<body>

<h1>🎀 럭키 뽑기 🎀</h1>

<div id="board"></div>

<div id="result">
    <div id="text"></div>
</div>

<script>

const prizes=[];

// 총 300장

for(let i=0;i<2;i++) prizes.push("🥇1등");
for(let i=0;i<5;i++) prizes.push("🥈2등");
for(let i=0;i<10;i++) prizes.push("🥉3등");
for(let i=0;i<20;i++) prizes.push("🏅4등");
for(let i=0;i<30;i++) prizes.push("🎖️5등");
for(let i=0;i<40;i++) prizes.push("6등");
for(let i=0;i<50;i++) prizes.push("7등");
for(let i=0;i<55;i++) prizes.push("8등");
for(let i=0;i<45;i++) prizes.push("9등");
for(let i=0;i<43;i++) prizes.push("🔟10등");

// 섞기
prizes.sort(()=>Math.random()-0.5);

const board=document.getElementById("board");

for(let i=0;i<300;i++){

    const ticket=document.createElement("div");

    ticket.className="ticket";
    ticket.innerHTML="🎫";

    ticket.onclick=()=>draw(ticket,i);

    board.appendChild(ticket);
}

function draw(ticket,index){

    if(ticket.classList.contains("used")) return;

    ticket.classList.add("used");

    const result=document.getElementById("result");
    const text=document.getElementById("text");

    result.style.display="flex";
    text.classList.add("drum");

    let count=0;

    const ani=setInterval(()=>{

        count++;

        text.innerHTML="🥁 두구두구 🥁";

        if(count>=20){

            clearInterval(ani);

            text.classList.remove("drum");

            text.innerHTML=
            "🎉 "+prizes[index]+" 🎉";

            setTimeout(()=>{
                result.style.display="none";
            },2500);
        }

    },100);
}
</script>

</body>
</html>
