<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나라 점수판</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.board{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,200px);
    gap:10px;
}

.country{
    border:3px solid #333;
    border-radius:12px;
    padding:15px;
    text-align:center;
    background:white;
}

.name{
    font-size:20px;
    font-weight:bold;
}

.score{
    font-size:32px;
    margin-top:10px;
}

.info{
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="board">
    <h1>🌏 Country Score</h1>

    <div class="grid">
        <div class="country">
            <div class="name">🇰🇷 Korea</div>
            <div class="score" id="korea">0</div>
        </div>

        <div class="country">
            <div class="name">🇨🇳 China</div>
            <div class="score" id="china">0</div>
        </div>

        <div class="country">
            <div class="name">🇯🇵 Japan</div>
            <div class="score" id="japan">0</div>
        </div>

        <div class="country">
            <div class="name">🇻🇳 Vietnam</div>
            <div class="score" id="vietnam">0</div>
        </div>

        <div class="country">
            <div class="name">🇹🇭 Thailand</div>
            <div class="score" id="thailand">0</div>
        </div>

        <div class="country">
            <div class="name">🇺🇸 USA</div>
            <div class="score" id="usa">0</div>
        </div>
    </div>

    <div class="info">
        1=한국 | 2=중국 | 3=일본 | 4=베트남 | 5=태국 | 6=미국<br>
        누를 때마다 +5점
    </div>
</div>

<script>
const scores = {
    korea:0,
    china:0,
    japan:0,
    vietnam:0,
    thailand:0,
    usa:0
};

document.addEventListener("keydown", (e)=>{

    if(e.key==="1"){
        scores.korea += 5;
        document.getElementById("korea").textContent = scores.korea;
    }

    if(e.key==="2"){
        scores.china += 5;
        document.getElementById("china").textContent = scores.china;
    }

    if(e.key==="3"){
        scores.japan += 5;
        document.getElementById("japan").textContent = scores.japan;
    }

    if(e.key==="4"){
        scores.vietnam += 5;
        document.getElementById("vietnam").textContent = scores.vietnam;
    }

    if(e.key==="5"){
        scores.thailand += 5;
        document.getElementById("thailand").textContent = scores.thailand;
    }

    if(e.key==="6"){
        scores.usa += 5;
        document.getElementById("usa").textContent = scores.usa;
    }

});
</script>

</body>
</html>
