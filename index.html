<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메모장</title>

<link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/yg-jalnan.woff" rel="preload" as="font" crossorigin>

<style>
@font-face {
    font-family: 'Jalnan';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/yg-jalnan.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e8d8ff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Jalnan', sans-serif;
}

.memo{
    width:90%;
    max-width:700px;
    background:white;
    border-radius:25px;
    padding:25px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#8a63d2;
    margin-bottom:20px;
    font-size:2rem;
}

textarea{
    width:100%;
    height:400px;
    border:none;
    outline:none;
    resize:none;
    font-family:'Jalnan', sans-serif;
    font-size:20px;
    line-height:1.7;
    color:#555;
}

.info{
    margin-top:10px;
    text-align:right;
    color:#999;
    font-size:14px;
}
</style>
</head>
<body>

<div class="memo">
    <h1>💜 메모장 💜</h1>
    <textarea id="memo" placeholder="메모를 입력하세요..."></textarea>
    <div class="info">
        글자 수 : <span id="count">0</span>
    </div>
</div>

<script>
const memo = document.getElementById("memo");
const count = document.getElementById("count");

memo.value = localStorage.getItem("memo") || "";

function saveMemo(){
    localStorage.setItem("memo", memo.value);
    count.textContent = memo.value.length;
}

memo.addEventListener("input", saveMemo);

count.textContent = memo.value.length;
</script>

</body>
</html>
